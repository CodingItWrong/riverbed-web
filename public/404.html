<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Riverbed</title>
    <script>
      // GitHub Pages SPA redirect: encode the path into a query string so the
      // root index.html can restore it via history.replaceState.
      // https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          '/?/' +
          l.pathname.slice(1).replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
