# Supply-chain security hardening — https://pnpm.io/supply-chain-security
blockExoticSubdeps: true
minimumReleaseAge: 10080
trustPolicy: no-downgrade
# Vetted exceptions: semver 5.7.2/6.3.1 are the CVE-2022-25883 patched releases;
# ua-parser-js 1.0.41 is the current stable. All are deep transitive deps.
trustPolicyExclude:
  - semver
  - ua-parser-js
engineStrict: true

allowBuilds:
  cypress: true
  unrs-resolver: true
overrides:
  'fast-xml-parser@>=4.0.0-beta.3 <4.5.5': '>=4.5.5'
  'shell-quote@<1.8.4': '>=1.8.4'
  'flatted@<=3.4.1': '>=3.4.2'
  'picomatch@<2.3.2': '>=2.3.2'
  'picomatch@>=4.0.0 <4.0.4': '>=4.0.4'
