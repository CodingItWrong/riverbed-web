# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait 7 days after a release before opening a PR, matching the
    # minimumReleaseAge: 10080 (1 week) supply-chain policy in pnpm-workspace.yaml.
    # Avoids PRs that would fail CI's frozen install on too-new versions.
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "@babel/core"
      - dependency-name: "@mui/x-date-pickers"
        versions: [">= 7"]
      - dependency-name: "eslint"
        versions: [">= 9"]
      - dependency-name: "eslint-plugin-react-hooks"
      - dependency-name: "react-native"
      - dependency-name: "react-native-web"
